<div class="max-w-2xl mx-auto">
  <div
    class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6"
  >
    <div class="mb-5 flex items-center gap-3">
      <span
        class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-[#e7f3ff] text-blue"
      >
        <i class="fa-solid fa-key"></i>
      </span>
      <div>
        <h1 class="text-xl font-extrabold text-slate-900 sm:text-2xl">
          {{ "changePassword.title" | translate }}
        </h1>
        <p class="text-sm text-slate-500">
          {{ "changePassword.subtitle" | translate }}
        </p>
      </div>
    </div>
    <form
      [formGroup]="forgotPasswordForm"
      (ngSubmit)="onSubmit()"
      class="space-y-4"
    >
      <label class="block"
        ><span class="mb-1.5 block text-sm font-bold text-slate-700">
          {{ "changePassword.currentPassword.label" | translate }} </span
        ><input
          formControlName="currentPassword"
          [placeholder]="
            'changePassword.currentPassword.placeholder' | translate
          "
          class="w-full rounded-xl border bg-slate-50 px-3 py-2.5 text-sm text-slate-800 outline-none transition border-slate-200 focus:border-blue focus:bg-white"
          type="password"
          value=""
          name="currentPassword"
        />
        @if (
          forgotPasswordForm.get("currentPassword")?.hasError("required") &&
          forgotPasswordForm.get("currentPassword")?.touched
        ) {
          <p class="mt-1 text-xs font-semibold text-rose-600">
            {{ "changePassword.currentPassword.required" | translate }}
          </p>
        }</label
      ><label class="block"
        ><span class="mb-1.5 block text-sm font-bold text-slate-700">{{
          "changePassword.newPassword.label" | translate
        }}</span
        ><input
          formControlName="newPassword"
          [placeholder]="'changePassword.newPassword.placeholder' | translate"
          class="w-full rounded-xl border bg-slate-50 px-3 py-2.5 text-sm text-slate-800 outline-none transition border-slate-200 focus:border-blue focus:bg-white"
          type="password"
          value=""
          name="newPassword"
        />
        @if (
          forgotPasswordForm.get("newPassword")?.hasError("required") &&
          forgotPasswordForm.get("newPassword")?.touched
        ) {
          <p class="mt-1 text-xs font-semibold text-rose-600">
            {{ "changePassword.newPassword.required" | translate }}
          </p>
        } @else if (
          forgotPasswordForm.get("newPassword")?.hasError("pattern") &&
          forgotPasswordForm.get("newPassword")?.touched
        ) {
          <p class="mt-1 text-xs font-semibold text-rose-600">
            {{ "changePassword.newPassword.pattern" | translate }}
          </p>
        } @else {
          <span class="mt-1 block text-xs text-slate-500">{{
            "changePassword.newPassword.hint" | translate
          }}</span>
        }</label
      ><label class="block"
        ><span class="mb-1.5 block text-sm font-bold text-slate-700">{{
          "changePassword.confirmPassword.label" | translate
        }}</span
        ><input
          formControlName="confirmPassword"
          [placeholder]="
            'changePassword.confirmPassword.placeholder' | translate
          "
          class="w-full rounded-xl border bg-slate-50 px-3 py-2.5 text-sm text-slate-800 outline-none transition border-slate-200 focus:border-blue focus:bg-white"
          type="password"
          value=""
          name="confirmPassword"
        />
        @if (
          forgotPasswordForm.get("confirmPassword")?.hasError("required") &&
          forgotPasswordForm.get("confirmPassword")?.touched
        ) {
          <p class="mt-1 text-xs font-semibold text-rose-600">
            {{ "changePassword.confirmPassword.required" | translate }}
          </p>
        } @else if (
          forgotPasswordForm.hasError("mismatch") &&
          forgotPasswordForm.get("confirmPassword")?.touched
        ) {
          <p class="mt-1 text-xs font-semibold text-rose-600">
            {{ "changePassword.confirmPassword.mismatch" | translate }}
          </p>
        }</label
      ><button
        type="submit"
        [disabled]="forgotPasswordForm.invalid"
        class="inline-flex w-full items-center justify-center rounded-xl bg-blue px-4 py-2.5 text-sm font-bold text-white transition hover:bg-[#166fe5] disabled:cursor-not-allowed disabled:opacity-60"
      >
        {{ "changePassword.updateButton" | translate }}
      </button>
    </form>
  </div>
</div>
