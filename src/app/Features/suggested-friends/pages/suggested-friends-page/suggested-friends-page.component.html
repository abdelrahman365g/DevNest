<div class="mx-auto max-w-7xl px-3 py-3.5">
  <main class="min-w-0">
    <div class="mx-auto max-w-4xl space-y-4">
      <a
        routerLink="/feed"
        class="inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-50 cursor-pointer"
      >
        <i class="fa-solid fa-chevron-left"></i>
        Back to feed
      </a>
      <section
        class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm"
      >
        <div class="mb-3 flex items-center justify-between gap-2">
          <div class="flex items-center gap-2">
            <i class="fa-solid fa-users text-blue"></i>
            <h1 class="text-xl font-extrabold text-slate-900">
              All Suggested Friends
            </h1>
          </div>
          <span
            class="rounded-full bg-slate-100 px-2 py-0.5 text-xs font-bold text-slate-600"
            >{{ suggestions.length }}</span
          >
        </div>
        <label class="relative mb-4 block">
          <i
            class="fa-solid fa-magnifying-glass pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
          ></i>
          <input
            placeholder="Search by name or username..."
            class="w-full rounded-xl border border-slate-200 bg-slate-50 py-2.5 pl-10 pr-3 text-sm text-slate-700 outline-none focus:border-blue focus:bg-white"
            [(ngModel)]="searchTerm"
            (input)="filterSuggestions()"
        /></label>
        <div class="grid gap-3 sm:grid-cols-2">
          @for (friend of filteredSuggestions; track $index) {
            <app-friend-card
              [friend]="friend"
              (reload)="reloadSuggestions()"
            ></app-friend-card>
          }
        </div>
        <button
          (click)="loadMore()"
          [disabled]="isLoading"
          class="mt-4 inline-flex w-full items-center justify-center gap-2 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-100 disabled:opacity-60"
        >
          @if (isLoading) {
            <i class="fas fa-spinner fa-spin"></i>
            Loading...
          } @else {
            Load more users
          }
        </button>
      </section>
    </div>
  </main>
</div>
