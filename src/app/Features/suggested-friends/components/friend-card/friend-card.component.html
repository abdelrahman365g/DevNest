<article class="rounded-xl border border-slate-200 p-3">
  <div class="flex items-center justify-between gap-3">
    <button
      type="button"
      class="flex min-w-0 items-center gap-3 rounded-lg px-1 py-1 text-left transition hover:bg-slate-50"
    >
      <img
        [routerLink]="['/profile', friend._id]"
        [alt]="friend.name"
        class="h-12 w-12 rounded-full object-cover"
        [src]="friend.photo"
      />
      <div class="min-w-0">
        <p
          [routerLink]="['/profile', friend._id]"
          class="truncate text-sm font-bold text-slate-900 hover:underline"
        >
          {{ friend.name }}
        </p>
        <p class="truncate text-xs text-slate-500">
          {{ friend.username ? friend.username : "route user" }}
        </p>
      </div></button
    ><button
      (click)="followUser(friend._id)"
      [disabled]="isLoading || friend.isFollowed"
      class="inline-flex items-center gap-1 rounded-full px-3 py-1.5 text-xs font-bold transition disabled:opacity-60 bg-[#e7f3ff] text-blue hover:bg-[#d8ebff] cursor-pointer disabled:cursor-not-allowed"
    >
      @if (!friend.isFollowed) {
        <i class="fa-solid fa-user-plus"></i>
        @if (isLoading) {
          Updating <i class="fas fa-spinner fa-spin"></i>
        } @else {
          Follow
        }
      } @else {
        Followed
      }
    </button>
  </div>
  <div
    class="mt-2 flex items-center gap-2 text-[11px] font-semibold text-slate-500"
  >
    <span class="rounded-full bg-slate-100 px-2 py-0.5"
      >{{ friend.followersCount }} followers</span
    >
    @if (friend.mutualFollowersCount > 0) {
      <span class="rounded-full bg-[#edf4ff] px-2 py-0.5 text-blue"
        >{{ friend.mutualFollowersCount }} mutual</span
      >
    }
  </div>
</article>
