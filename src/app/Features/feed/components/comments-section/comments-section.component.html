<div class="border-t border-slate-200 bg-[#f7f8fa] px-4 py-4 rounded-b-xl">
  <div
    class="mb-3 flex flex-wrap items-center justify-between gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2"
  >
    <div class="flex items-center gap-2">
      <p class="text-sm font-extrabold tracking-wide text-slate-700">
        Comments
      </p>
      <span
        class="rounded-full bg-[#e7f3ff] px-2 py-0.5 text-[11px] font-bold text-blue"
        >{{ comments.length }}</span
      >
    </div>
    <select
      class="rounded-lg border border-slate-200 bg-slate-50 px-4 py-1.5 text-xs font-bold text-slate-700 outline-none ring-blue/20 focus:border-none focus:bg-white focus:ring-2"
    >
      <option value="relevant">Most relevant</option>
      <option value="newest">Newest</option>
    </select>
  </div>
  <div class="space-y-2">
    @for (comment of comments; track $index) {
      <app-comment-card
        [comment]="comment"
        (commentDeleted)="deleteComment($event)"
      ></app-comment-card>
    } @empty {
      <div
        class="rounded-2xl border border-slate-200 bg-white px-4 py-8 text-center"
      >
        <div
          class="mx-auto mb-3 inline-flex h-12 w-12 items-center justify-center rounded-full bg-blue-100 text-blue"
        >
          <i class="fa-regular fa-comment"></i>
        </div>
        <p class="text-lg font-extrabold text-slate-800">No comments yet</p>
        <p class="mt-1 text-sm font-medium text-slate-500">
          Be the first to comment.
        </p>
      </div>
    }
  </div>
  <app-comment-form
    [user]="user"
    [postId]="postId"
    (comment)="addComment($event)"
    class="mt-4 block"
  ></app-comment-form>
</div>
