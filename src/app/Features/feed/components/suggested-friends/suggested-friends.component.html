<aside class="hidden h-fit xl:sticky xl:top-18 lg:block">
  <div class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
    <div class="mb-3 flex items-center justify-between gap-2">
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-users text-blue"></i>
        <h3 class="text-base font-extrabold text-slate-900">
          Suggested Friends
        </h3>
      </div>
      <span
        class="rounded-full bg-slate-100 px-2 py-0.5 text-xs font-bold text-slate-600"
        >{{ suggestions.length }}</span
      >
    </div>
    <div class="mb-3">
      <label class="relative block">
        <i
          class="fa-solid fa-magnifying-glass pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
        ></i>
        <input
          placeholder="Search friends..."
          class="w-full rounded-xl border border-slate-200 bg-slate-50 py-2 pl-9 pr-3 text-sm text-slate-700 outline-none focus:border-blue focus:bg-white"
          [(ngModel)]="searchTerm"
          (input)="filterSuggestions()"
      /></label>
    </div>
    <div class="space-y-3">
      @for (suggested of filteredSuggestions; track $index) {
        <div class="rounded-xl border border-slate-200 p-2.5">
          <div class="flex items-center justify-between gap-2">
            <button
              type="button"
              class="flex min-w-0 items-center gap-2 rounded-lg px-1 py-1 text-left transition hover:bg-slate-50"
            >
              <img
                [alt]="suggested.name"
                class="h-10 w-10 rounded-full object-cover"
                [src]="suggested.photo"
              />
              <div class="min-w-0">
                <p
                  [routerLink]="['/profile', suggested._id]"
                  class="truncate text-sm font-bold text-slate-900 hover:underline"
                >
                  {{ suggested.name }}
                </p>
                <p class="truncate text-xs text-slate-500">
                  {{ suggested.username ? `@${suggested.username}` : "user" }}
                </p>
              </div></button
            ><button
              [disabled]="currentId == suggested._id"
              (click)="followUser(suggested._id)"
              class="cursor-pointer inline-flex items-center gap-1 rounded-full px-3 py-1.5 text-xs font-bold transition disabled:opacity-60 bg-[#e7f3ff] text-blue hover:bg-[#d8ebff]"
            >
              <i class="fa-solid fa-user-plus"></i>
              @if (isLoading && currentId == suggested._id) {
                Updating...
              } @else {
                Follow
              }
            </button>
          </div>
          <div class="flex gap-2 items-center">
            <div
              class="mt-2 flex items-center gap-2 text-xs font-semibold text-slate-500"
            >
              <span class="rounded-full bg-slate-100 px-2 py-0.5"
                >{{ suggested.followersCount }} followers</span
              >
              @if (suggested.mutualFollowersCount > 0) {
                <span class="rounded-full bg-[#edf4ff] px-2 py-0.5 text-blue"
                  >{{ suggested.mutualFollowersCount }} mutual</span
                >
              }
            </div>
          </div>
        </div>
      } @empty {
        <p>No Suggested Friends</p>
      }
    </div>
    <a
      routerLink="suggested-friends"
      class="mt-3 inline-flex w-full items-center justify-center gap-2 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-100"
    >
      View more
    </a>
  </div>
</aside>
