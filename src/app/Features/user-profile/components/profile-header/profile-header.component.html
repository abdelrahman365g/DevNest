<section
  class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-[0_2px_10px_rgba(15,23,42,.06)] sm:rounded-[28px]"
>
  <div class="relative h-44 sm:h-52 lg:h-60 group">
    @if (user?.cover) {
      <img [src]="user?.cover" alt="Cover" class="object-cover w-full h-full" />
    } @else {
      <div
        class="w-full h-full bg-linear-to-br from-slate-900 via-blue-900 to-blue-400"
      ></div>
    }
    @if (user?.isOwner) {
      <label
        class="absolute top-0 right-0 m-6 inline-flex cursor-pointer items-center gap-1 rounded-lg bg-black/45 px-2 py-1 text-xs font-bold text-white backdrop-blur transition hover:bg-black/60 sm:gap-1.5 sm:px-3 sm:py-1.5 sm:text-xs opacity-0 group-hover:opacity-100"
        ><i class="fa-solid fa-camera"></i> Add cover<input
          accept="image/*"
          class="hidden"
          type="file"
      /></label>
    }
  </div>
  <div class="relative -mt-12 px-3 pb-5 sm:-mt-16 sm:px-8 sm:pb-6">
    <div
      class="rounded-3xl border border-white/60 bg-white/92 p-5 backdrop-blur-xl sm:p-7"
    >
      <div
        class="flex flex-col gap-6 lg:flex-row lg:items-center lg:justify-between"
      >
        <div class="min-w-0">
          <div class="flex items-end gap-4">
            <div class="group/avatar relative shrink-0">
              <button type="button" class="cursor-pointer rounded-full">
                <img
                  [alt]="user?.name"
                  class="h-28 w-28 rounded-full border-4 border-white object-cover shadow-md ring-2 ring-[#dbeafe]"
                  [src]="user?.photo"
                />
              </button>
              @if (user?.isOwner) {
                <button
                  type="button"
                  class="absolute bottom-1 left-1 flex h-9 w-9 cursor-pointer items-center justify-center rounded-full bg-white text-blue opacity-100 shadow-sm ring-1 ring-slate-200 transition duration-200 hover:bg-slate-50 sm:opacity-0 sm:group-hover/avatar:opacity-100 sm:group-focus-within/avatar:opacity-100"
                >
                  <i class="fa-solid fa-expand"></i></button
                ><label
                  class="absolute bottom-1 right-1 flex h-9 w-9 cursor-pointer items-center justify-center rounded-full bg-blue text-white opacity-100 shadow-sm transition duration-200 hover:bg-[#166fe5] sm:opacity-0 sm:group-hover/avatar:opacity-100 sm:group-focus-within/avatar:opacity-100"
                >
                  <i class="fa-regular fa-camera"></i>
                  <input accept="image/*" class="hidden" type="file"
                /></label>
              }
            </div>
            <div class="min-w-0 pb-1">
              <h2
                class="truncate text-2xl font-black tracking-tight text-slate-900 sm:text-4xl"
              >
                {{ user?.name }}
              </h2>
              <p class="mt-1 text-lg font-semibold text-slate-500 sm:text-xl">
                @{{ user?.username }}
              </p>
            </div>
          </div>
        </div>
        <div class="grid w-full grid-cols-2 gap-2 lg:w-130">
          <app-state-card
            [title]="'Followers'"
            [count]="user?.followersCount ?? 0"
          ></app-state-card>
          <app-state-card
            [title]="'Following'"
            [count]="user?.followingCount ?? 0"
          ></app-state-card>
        </div>
        @if (!user?.isOwner) {
          <button
            type="button"
            (click)="followUser(user?.id)"
            class="inline-flex w-full items-center justify-center gap-2 rounded px-4 py-2 text-sm font-extrabold transition sm:w-auto border border-slate-300 bg-white text-slate-700 hover:bg-slate-100"
          >
            @if (user?.isFollowing) {
              @if (isUpdatingFollow) {
                <i class="fas fa-spinner fa-spin"></i>
                Unfollowing...
              } @else {
                <i class="fa-solid fa-check"></i>
                Following
              }
            } @else {
              @if (isUpdatingFollow) {
                <i class="fas fa-spinner fa-spin"></i>
                Following...
              } @else {
                <i class="fa-solid fa-plus"></i>
                Follow
              }
            }
          </button>
        }
      </div>
      @if (user?.isOwner) {
        <div class="mt-5 grid gap-4 lg:grid-cols-[1.3fr_.7fr]">
          <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
            <h3 class="text-sm font-extrabold text-slate-800">About</h3>
            <div class="mt-3 space-y-2 text-sm text-slate-600">
              <p class="flex items-center gap-2">
                <i class="fa-regular fa-envelope text-slate-500"></i>
                {{ user?.email }}
              </p>
            </div>
          </div>
          <div class="grid gap-3 sm:grid-cols-2 lg:grid-cols-1">
            <div
              class="rounded-2xl border border-[#dbeafe] bg-[#f6faff] px-4 py-3"
            >
              <p
                class="text-xs font-bold uppercase tracking-wide text-[#1f4f96]"
              >
                My posts
              </p>
              <p class="mt-1 text-2xl font-black text-slate-900">
                {{ postStateService.myPostsCount }}
              </p>
            </div>
            <div
              class="rounded-2xl border border-[#dbeafe] bg-[#f6faff] px-4 py-3"
            >
              <p
                class="text-xs font-bold uppercase tracking-wide text-[#1f4f96]"
              >
                Saved posts
              </p>
              <p class="mt-1 text-2xl font-black text-slate-900">
                {{ user?.bookmarksCount }}
              </p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
