@if (show) {
  <div
    #backdrop
    class="fixed inset-0 z-100 flex items-center justify-center bg-slate-900/60 p-4"
  >
    <div
      #modal
      class="w-full max-w-130 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-2xl"
    >
      <div
        class="flex items-center justify-between border-b border-slate-200 px-4 py-3"
      >
        <h4 class="text-base font-extrabold text-slate-900">Confirm action</h4>
        <button
          type="button"
          (click)="closeModal()"
          class="inline-flex h-8 w-8 items-center justify-center rounded-full text-slate-500 transition hover:bg-slate-100 hover:text-slate-700"
        >
          <i class="fa-solid fa-x"></i>
        </button>
      </div>
      <div class="flex items-start gap-3 p-4">
        <div
          class="mt-0.5 inline-flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-rose-100 text-rose-600"
        >
          <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <div>
          <h5 class="text-sm font-extrabold text-slate-900">
            Delete this post?
          </h5>
          <p class="mt-1 text-sm text-slate-600">
            This post will be permanently removed from your profile and feed.
          </p>
        </div>
      </div>
      <div
        class="flex items-center justify-end gap-2 border-t border-slate-200 px-4 py-3"
      >
        <button
          type="button"
          (click)="onCancel()"
          class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-60"
        >
          Cancel</button
        ><button
          type="button"
          (click)="onConfirm()"
          class="rounded-lg bg-rose-600 px-4 py-2 text-sm font-bold text-white transition hover:bg-rose-700 disabled:cursor-not-allowed disabled:opacity-70"
        >
          Delete post
        </button>
      </div>
    </div>
  </div>
}
