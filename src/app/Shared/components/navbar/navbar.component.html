<header
  class="sticky top-0 z-40 border-b border-slate-200/90 bg-white/95 backdrop-blur"
>
  <div
    class="mx-auto flex max-w-7xl items-center justify-between gap-2 px-2 py-1.5 sm:gap-3 sm:px-3"
  >
    <div class="flex items-center gap-0.5">
      <img
        alt=" DevNest"
        class="h-9 w-9 rounded-xl object-cover"
        src="logo.svg"
      />
      <p class="hidden text-2xl font-extrabold text-slate-900 sm:block">
        DevNest
      </p>
    </div>
    <nav
      class="flex min-w-0 items-center gap-1 overflow-x-auto rounded-2xl border border-slate-200 bg-slate-50/90 px-1 py-1 sm:px-1.5"
    >
      <a
        routerLink="feed"
        routerLinkActive="bg-white !text-[#1f6fe5]"
        class="relative flex items-center gap-1.5 rounded-xl px-2.5 py-2 text-sm font-extrabold transition sm:gap-2 sm:px-3.5 text-slate-600 hover:bg-white/90 hover:text-slate-900"
        ><i class="fa-regular fa-house relative text-lg"></i>
        <span class="hidden sm:inline">Feed</span
        ><span class="sr-only sm:hidden">Feed</span></a
      ><a
        [routerLink]="['/profile', userId]"
        routerLinkActive="bg-white !text-[#1f6fe5]"
        class="relative flex items-center gap-1.5 rounded-xl px-2.5 py-2 text-sm font-extrabold transition sm:gap-2 sm:px-3.5 text-slate-600 hover:bg-white/90 hover:text-slate-900"
        ><i class="fa-regular fa-user relative text-lg"></i>

        <span class="hidden sm:inline">Profile</span
        ><span class="sr-only sm:hidden">Profile</span></a
      ><a
        routerLink="notifications"
        routerLinkActive="bg-white !text-[#1f6fe5]"
        class="relative flex items-center gap-1.5 rounded-xl px-2.5 py-2 text-sm font-extrabold transition sm:gap-2 sm:px-3.5 text-slate-600 hover:bg-white/90 hover:text-slate-900"
        ><i class="fa-regular fa-comment relative text-lg"></i>

        <span class="hidden sm:inline">Notifications</span
        ><span class="sr-only sm:hidden">Notifications</span></a
      >
    </nav>
    <div class="relative flex items-center gap-2">
      <!-- <div class="relative w-25">
        <select
          (change)="switchLanguage($event)"
          class="w-full cursor-pointer rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm font-semibold text-slate-700 shadow-sm outline-none focus:border-blue-500"
        >
          <option value="">{{ "language" | translate }}</option>
          <option value="en">English</option>
          <option value="ar">العربية</option>
        </select>
      </div> -->
      <button
        #dropdownBtn
        (click)="toggleDropdown()"
        class="flex items-center gap-2 cursor-pointer rounded-full border border-slate-200 bg-slate-50 px-2 py-1.5 transition hover:bg-slate-100"
      >
        <img
          [alt]="userData ? userData.user.name : 'some name'"
          class="h-8 w-8 rounded-full object-cover"
          [src]="userData ? userData.user.photo : 'default-profile.png'"
        /><span
          class="hidden max-w-35 truncate text-sm font-semibold text-slate-800 md:block"
          >{{ userData.user.name }}
        </span>
        <i class="fa-solid fa-bars text-lg"></i>
      </button>
      @if (isOpen) {
        <div
          #dropdown
          (click)="closeDropdown()"
          class="z-50 absolute top-full right-0 mt-2 p-2 bg-white border border-slate-200 rounded-xl shadow-lg w-52 text-sm text-body font-medium"
        >
          <a
            [routerLink]="['/profile', userId]"
            class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded"
          >
            <i class="fa-regular fa-user me-2"></i>
            Profile</a
          >
          <a
            routerLink="settings"
            class="inline-flex items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded"
          >
            <i class="fa-solid fa-gear me-2"></i>
            Settings</a
          >
          <div class="my-1 border-t border-slate-300"></div>

          <a
            (click)="logout()"
            class="flex w-full items-center gap-2 rounded px-3 py-2 text-sm font-semibold text-rose-600 hover:bg-rose-50 cursor-pointer"
          >
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            Log out</a
          >
        </div>
      }
    </div>
  </div>
</header>
